version: '3.8'

services:
  mysql_mindset:
    image: mysql:8.0
    container_name: mindset_mysql
    environment:
      MYSQL_ROOT_PASSWORD: mindset_pass_123
      MYSQL_DATABASE: mindset_db
    ports:
      - '3308:3306' # use a new port to avoid conflicts
    volumes:
      - mindset_mysql_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin_mindset:
    image: phpmyadmin/phpmyadmin
    container_name: mindset_phpmyadmin
    environment:
      PMA_HOST: mysql_mindset
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: mindset_pass_123
    ports:
      - '8082:80' # new port
    depends_on:
      - mysql_mindset
    restart: unless-stopped

volumes:
  mindset_mysql_data:
